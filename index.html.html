<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN',Meiryo,'Yu Gothic',sans-serif;background:#f2f2ed;color:#1a1a1a;min-height:100vh;font-size:15px}

/* ヘッダー */
.header{background:#1a1a1a;color:#fff;padding:0 24px;display:flex;align-items:center;gap:16px;height:52px;position:sticky;top:0;z-index:200}
.header-brand{font-size:11px;color:#888;letter-spacing:.1em;text-transform:uppercase}
.header-title{font-size:16px;font-weight:500;letter-spacing:.02em}

/* ナビ */
.nav{background:#fff;border-bottom:1px solid #e0e0d8;display:flex;padding:0 20px;overflow-x:auto;gap:4px}
.nav-btn{border:none;background:none;padding:13px 18px;font-size:14px;cursor:pointer;color:#999;border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit;transition:color .15s}
.nav-btn.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500}
.nav-btn:hover:not(.active){color:#555}

/* レイアウト */
.main{max-width:1100px;margin:0 auto;padding:28px 20px}
.tab{display:none}.tab.active{display:block}

/* カード */
.card{background:#fff;border:1px solid #e0e0d8;border-radius:12px;overflow:hidden;margin-bottom:16px}
.card-body{padding:20px 24px}

/* 統計カード */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
@media(max-width:640px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:#fff;border:1px solid #e0e0d8;border-radius:10px;padding:16px 18px}
.stat-label{font-size:12px;color:#999;margin-bottom:6px;font-weight:500;letter-spacing:.03em}
.stat-value{font-size:22px;font-weight:500;color:#1a1a1a}

/* テーブル — 文字大きめ */
.tbl{width:100%;border-collapse:collapse}
.tbl th{padding:12px 16px;text-align:left;font-size:13px;font-weight:600;color:#888;background:#fafaf7;border-bottom:1px solid #e8e8e0;letter-spacing:.03em;white-space:nowrap}
.tbl td{padding:14px 16px;font-size:15px;border-bottom:1px solid #f0f0e8;vertical-align:middle}
.tbl tbody tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:#fafaf7}

/* バッジ */
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:600;white-space:nowrap}
.badge-ok{background:#e8f5e9;color:#2e7d32}
.badge-low{background:#fff8e1;color:#e65100}
.badge-zero{background:#ffebee;color:#c62828}
.badge-in{background:#e3f2fd;color:#1565c0}
.badge-out{background:#fff3e0;color:#bf360c}
.badge-move{background:#f3e5f5;color:#6a1b9a}

/* フォーム */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
@media(max-width:580px){.form-grid{grid-template-columns:1fr}}
.fg{display:flex;flex-direction:column;gap:5px}
.fg.full{grid-column:span 2}
@media(max-width:580px){.fg.full{grid-column:span 1}}
.fg label{font-size:12px;font-weight:600;color:#888;letter-spacing:.04em}
input,select,textarea{padding:10px 12px;font-size:15px;border:1px solid #d8d8d0;border-radius:8px;background:#fff;font-family:inherit;width:100%;color:#1a1a1a;outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:#1a1a1a}
input::placeholder{color:#bbb}

/* ボタン */
.btn{padding:10px 22px;font-size:14px;border:1px solid #d0d0c8;border-radius:8px;background:#fff;cursor:pointer;font-family:inherit;color:#1a1a1a;font-weight:500;transition:all .1s;white-space:nowrap}
.btn:hover{background:#f5f5f0;border-color:#aaa}
.btn:active{transform:scale(.98)}
.btn-dark{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-dark:hover{background:#333}
.btn-danger{color:#c62828;border-color:#e8c8c8}
.btn-danger:hover{background:#fff5f5}
.btn-sm{padding:6px 14px;font-size:13px}
.btn-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

/* 情報ボックス */
.info-box{background:#f5f5f0;border-radius:8px;padding:12px 16px;font-size:14px;color:#555;border:1px solid #e8e8e0}
.cost-box{background:#eff6ff;border-radius:8px;padding:12px 16px;font-size:14px;color:#1565c0;border:1px solid #d0e4f8;margin-bottom:14px;font-weight:500}

/* サーチバー */
.search-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.search-bar input{flex:1;min-width:160px}

/* セクションタイトル */
.sec-title{font-size:16px;font-weight:500;margin-bottom:16px;color:#1a1a1a}

/* 空 */
.empty{text-align:center;padding:56px 24px;color:#bbb;font-size:14px}

/* モーダル */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:28px;width:92%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal h3{font-size:16px;font-weight:500;margin-bottom:20px}

/* ローディング */
.loading{text-align:center;padding:64px;color:#aaa;font-size:15px}
.spin{display:inline-block;width:20px;height:20px;border:2px solid #ddd;border-top-color:#888;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* 設定未完了バナー */
.setup-banner{background:#fffbeb;border:1px solid #f5d97a;border-radius:10px;padding:16px 20px;margin-bottom:20px;font-size:14px;color:#92400e}
.setup-banner strong{display:block;font-size:15px;margin-bottom:4px}
</style>
</head>
<body>

<div class="header">
  <span class="header-brand">清水園</span>
  <span class="header-title">在庫管理システム</span>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="showTab('tab-list')">📋 在庫一覧</button>
  <button class="nav-btn" onclick="showTab('tab-in')">📥 入庫登録</button>
  <button class="nav-btn" onclick="showTab('tab-out')">📤 出庫登録</button>
  <button class="nav-btn" onclick="showTab('tab-supplier')">🏢 仕入先</button>
  <button class="nav-btn" onclick="showTab('tab-history')">📜 履歴</button>
</nav>

<div class="main">
  <div id="loading" class="loading"><span class="spin"></span>読み込み中...</div>

  <!-- 在庫一覧 -->
  <div id="tab-list" class="tab">
    <div id="stats" class="stats"></div>
    <div class="search-bar">
      <input type="text" id="filter-text" placeholder="🔍 樹種・仕入先で絞り込み..." oninput="renderList()">
      <select id="sort-key" onchange="renderList()">
        <option value="species">樹種順</option>
        <option value="qty">在庫数順</option>
        <option value="buyPrice">仕入値順</option>
      </select>
      <button class="btn" onclick="openAddModal()">＋ 品目追加</button>
    </div>
    <div class="card" id="list-card"><div id="list-body"><div class="loading"><span class="spin"></span></div></div></div>
  </div>

  <!-- 入庫登録 -->
  <div id="tab-in" class="tab">
    <div class="sec-title">入庫登録（仕入れ）</div>
    <div class="card"><div class="card-body">
      <div class="form-grid">
        <div class="fg"><label>仕入日</label><input type="date" id="in-date"></div>
        <div class="fg"><label>樹種名</label><input list="sp-list" id="in-species" placeholder="例：マキ"></div>
        <div class="fg"><label>規格 H（m）</label><input type="number" step="0.1" id="in-h" placeholder="例：1.5"></div>
        <div class="fg"><label>規格 C（m）</label><input type="number" step="0.01" id="in-c" placeholder="例：0.06"></div>
        <div class="fg"><label>規格 W（m）</label><input type="number" step="0.1" id="in-w" placeholder="例：1.0"></div>
        <div class="fg"><label>数量（本）</label><input type="number" min="1" id="in-qty" placeholder="例：10" oninput="calcTotal()"></div>
        <div class="fg"><label>仕入値（円/本）</label><input type="number" id="in-price" placeholder="例：3500" oninput="calcTotal()"></div>
        <div class="fg"><label>仕入先</label><select id="in-supplier" onchange="toggleFree('in')"></select></div>
        <div class="fg full" id="in-free-wrap" style="display:none"><label>仕入先（直接入力）</label><input id="in-free"></div>
        <div class="fg full"><label>備考</label><input id="in-memo" placeholder="品質メモ・ロットなど"></div>
      </div>
      <div class="cost-box" id="cost-box" style="display:none"></div>
      <div class="btn-row">
        <button class="btn btn-dark" onclick="submitIn()">入庫登録</button>
      </div>
    </div></div>
  </div>

  <!-- 出庫登録 -->
  <div id="tab-out" class="tab">
    <div class="sec-title">出庫登録（出荷・損耗）</div>
    <div class="card"><div class="card-body">
      <div class="form-grid">
        <div class="fg"><label>出庫日</label><input type="date" id="out-date"></div>
        <div class="fg"><label>区分</label>
          <select id="out-reason">
            <option value="出荷">出荷（販売）</option>
            <option value="移植">移植</option>
            <option value="損耗">損耗・廃棄</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div class="fg full"><label>品目選択</label><select id="out-item" onchange="updateOutInfo()"></select></div>
        <div class="fg"><label>数量（本）</label><input type="number" min="1" id="out-qty" oninput="updateOutInfo()"></div>
        <div class="fg" id="out-info-wrap" style="display:none">
          <label>在庫確認</label>
          <div class="info-box" id="out-info"></div>
        </div>
        <div class="fg full"><label>備考</label><input id="out-memo" placeholder="取引先名など"></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-dark" onclick="submitOut()">出庫登録</button>
      </div>
    </div></div>
  </div>

  <!-- 仕入先管理 -->
  <div id="tab-supplier" class="tab">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="sec-title" style="margin:0">仕入先管理</div>
      <button class="btn" onclick="openSupModal()">＋ 追加</button>
    </div>
    <div class="card"><div id="sup-body"></div></div>
  </div>

  <!-- 履歴 -->
  <div id="tab-history" class="tab">
    <div style="display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap">
      <div class="sec-title" style="margin:0">入出庫履歴</div>
      <select id="hist-filter" onchange="renderHistory()" style="width:auto;padding:8px 12px;font-size:14px">
        <option value="">すべて</option>
        <option value="入庫">入庫</option>
        <option value="出荷">出荷</option>
        <option value="移植">移植</option>
        <option value="損耗">損耗</option>
      </select>
    </div>
    <div class="card"><div id="hist-body"></div></div>
  </div>
</div>

<!-- 品目モーダル -->
<div class="overlay" id="item-modal">
  <div class="modal">
    <h3 id="modal-title">品目追加</h3>
    <div class="form-grid">
      <div class="fg"><label>樹種名</label><input list="sp-list" id="m-species" placeholder="例：マキ"></div>
      <div class="fg"><label>規格 H（m）</label><input type="number" step="0.1" id="m-h" placeholder="例：1.5"></div>
      <div class="fg"><label>規格 C（m）</label><input type="number" step="0.01" id="m-c" placeholder="例：0.06"></div>
      <div class="fg"><label>規格 W（m）</label><input type="number" step="0.1" id="m-w" placeholder="例：1.0"></div>
      <div class="fg"><label>仕入値（円/本）</label><input type="number" id="m-price" placeholder="例：3500"></div>
      <div class="fg"><label>仕入先</label><select id="m-supplier" onchange="toggleFree('m')"></select></div>
      <div class="fg full" id="m-free-wrap" style="display:none"><label>仕入先（直接入力）</label><input id="m-free"></div>
      <div class="fg full"><label>備考</label><input id="m-memo" placeholder="品質メモなど"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-dark" onclick="saveItem()">保存</button>
      <button class="btn" onclick="closeModal('item-modal')">キャンセル</button>
    </div>
  </div>
</div>

<!-- 仕入先モーダル -->
<div class="overlay" id="sup-modal">
  <div class="modal">
    <h3 id="sup-modal-title">仕入先追加</h3>
    <div class="form-grid">
      <div class="fg full"><label>仕入先名</label><input id="sm-name"></div>
      <div class="fg"><label>電話番号</label><input id="sm-tel"></div>
      <div class="fg"><label>備考</label><input id="sm-memo"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-dark" onclick="saveSup()">保存</button>
      <button class="btn" onclick="closeModal('sup-modal')">キャンセル</button>
    </div>
  </div>
</div>

<datalist id="sp-list">
  <option value="マキ"><option value="サツキ"><option value="ツツジ">
  <option value="ドウダン"><option value="モミジ"><option value="カシ">
  <option value="クロマツ"><option value="アカマツ"><option value="ヒイラギ"><option value="イヌツゲ">
</datalist>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// ======== Firebase 初期化 ========
var db;
var configOk = FIREBASE_CONFIG.apiKey && !FIREBASE_CONFIG.apiKey.includes('ここに');

if (configOk) {
  firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.firestore();
} else {
  document.getElementById('loading').innerHTML =
    '<div class="setup-banner"><strong>⚙️ セットアップが必要です</strong>' +
    'このHTMLファイルの上部にある <code>FIREBASE_CONFIG</code> にFirebaseの設定値を貼り付けてください。<br>' +
    '設定方法は別紙の「セットアップ手順」をご参照ください。</div>';
}

// ======== データ ========
var inventory = [];
var suppliers = [];
var history  = [];
var editItemId = null;
var editSupId  = null;

// ======== 初期化 ========
async function init() {
  if (!configOk) return;
  var today = new Date().toISOString().slice(0,10);
  document.getElementById('in-date').value = today;
  document.getElementById('out-date').value = today;
  try {
    await loadAll();
    document.getElementById('loading').style.display = 'none';
    showTab('tab-list');
  } catch(e) {
    document.getElementById('loading').innerHTML =
      '<div class="setup-banner"><strong>接続エラー</strong>' + e.message + '</div>';
  }
}

async function loadAll() {
  var [invSnap, supSnap, hisSnap] = await Promise.all([
    db.collection('inventory').get(),
    db.collection('suppliers').get(),
    db.collection('history').orderBy('createdAt','desc').limit(200).get(),
  ]);
  inventory = invSnap.docs.map(d=>({id:d.id,...d.data()}));
  suppliers  = supSnap.docs.map(d=>({id:d.id,...d.data()}));
  history    = hisSnap.docs.map(d=>({id:d.id,...d.data()}));
  buildSupSelects();
  buildOutSelect();
}

// ======== タブ ========
var TABS = ['tab-list','tab-in','tab-out','tab-supplier','tab-history'];
function showTab(id) {
  TABS.forEach(function(t){ document.getElementById(t).style.display='none'; });
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById(id).style.display = 'block';
  document.querySelectorAll('.nav-btn')[TABS.indexOf(id)].classList.add('active');
  if(id==='tab-list')     renderList();
  if(id==='tab-supplier') renderSup();
  if(id==='tab-history')  renderHistory();
}

// ======== 在庫一覧 ========
function renderList() {
  var f = v('filter-text'), sk = v('sort-key');
  var sm = supMap();
  var rows = inventory
    .filter(function(i){ return !f || (i.species||'').includes(f) || (sm[i.supplierId]||'').includes(f) || (i.supplierFree||'').includes(f); })
    .sort(function(a,b){
      if(sk==='qty')      return (Number(b.qty)||0)-(Number(a.qty)||0);
      if(sk==='buyPrice') return (Number(b.buyPrice)||0)-(Number(a.buyPrice)||0);
      return (a.species||'').localeCompare(b.species||'','ja');
    });

  var total = inventory.reduce(function(s,i){ return s+(Number(i.qty)||0); },0);
  var kinds = new Set(inventory.map(function(i){ return i.species; })).size;
  var val   = inventory.reduce(function(s,i){ return s+(Number(i.qty)||0)*(Number(i.buyPrice)||0); },0);
  var cnt   = inventory.filter(function(i){ return Number(i.qty)>0; }).length;
  document.getElementById('stats').innerHTML = [
    {l:'総在庫数',v:fmt(total)+'本'},{l:'品目数',v:fmt(cnt)+'種'},
    {l:'樹種数',v:fmt(kinds)+'種'},{l:'在庫評価額',v:'¥'+fmt(val)},
  ].map(function(c){ return '<div class="stat"><div class="stat-label">'+c.l+'</div><div class="stat-value">'+c.v+'</div></div>'; }).join('');

  if(!rows.length){
    document.getElementById('list-body').innerHTML='<div class="empty">'+(inventory.length?'該当する品目がありません':'品目がありません。入庫登録から追加してください')+'</div>';
    return;
  }
  var trs = rows.map(function(item){
    var q = Number(item.qty)||0;
    var bc = q<=0?'badge-zero':q<=5?'badge-low':'badge-ok';
    var spec = mkSpec(item);
    var sup = sm[item.supplierId]||item.supplierFree||'-';
    return '<tr>'
      +'<td style="font-weight:600">'+esc(item.species||'-')+'</td>'
      +'<td style="color:#666">'+esc(spec)+'</td>'
      +'<td><span class="badge '+bc+'">'+fmt(q)+' 本</span></td>'
      +'<td>'+(item.buyPrice?'¥'+fmt(item.buyPrice):'-')+'</td>'
      +'<td style="color:#666">'+esc(sup)+'</td>'
      +'<td style="color:#888;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(item.memo||'')+'</td>'
      +'<td style="white-space:nowrap">'
        +'<button class="btn btn-sm" onclick="editItem(\''+item.id+'\')">編集</button> '
        +'<button class="btn btn-sm btn-danger" onclick="delItem(\''+item.id+'\')">削除</button>'
      +'</td></tr>';
  }).join('');
  document.getElementById('list-body').innerHTML =
    '<table class="tbl"><thead><tr>'
    +'<th>樹種</th><th>規格（H/C/W）</th><th>在庫数</th><th>仕入値</th><th>仕入先</th><th>備考</th><th></th>'
    +'</tr></thead><tbody>'+trs+'</tbody></table>';
}

// ======== 入庫 ========
function calcTotal() {
  var q=Number(v('in-qty')),p=Number(v('in-price'));
  var el=document.getElementById('cost-box');
  if(q&&p){ el.style.display='block'; el.textContent='仕入総額：¥'+fmt(q*p); } else el.style.display='none';
}

async function submitIn() {
  var species=v('in-species').trim(), qty=Number(v('in-qty'));
  if(!species||!qty){alert('樹種と数量は必須です');return;}
  var entry={species,specH:v('in-h'),specC:v('in-c'),specW:v('in-w'),qty,
    buyPrice:v('in-price')||'',supplierId:v('in-supplier'),supplierFree:v('in-free'),memo:v('in-memo'),date:v('in-date')};
  var existing=inventory.find(function(i){
    return i.species===entry.species&&str(i.specH)===str(entry.specH)&&str(i.specC)===str(entry.specC)&&str(i.specW)===str(entry.specW);
  });
  if(existing){
    var newQty=(Number(existing.qty)||0)+qty;
    var upd={qty:newQty};
    if(entry.buyPrice) upd.buyPrice=entry.buyPrice;
    if(entry.supplierId) upd.supplierId=entry.supplierId;
    await db.collection('inventory').doc(existing.id).update(upd);
  } else {
    await db.collection('inventory').add({...entry});
  }
  await db.collection('history').add({type:'入庫',...entry,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
  await loadAll(); renderList(); buildOutSelect();
  alert('✅ 入庫登録しました');
  ['in-species','in-h','in-c','in-w','in-qty','in-price','in-free','in-memo'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('cost-box').style.display='none';
}

// ======== 出庫 ========
function buildOutSelect(){
  var sel=document.getElementById('out-item');
  if(!sel)return;
  sel.innerHTML='<option value="">品目を選択してください...</option>';
  inventory.filter(function(i){return Number(i.qty)>0;}).forEach(function(i){
    var opt=document.createElement('option');
    opt.value=i.id;
    opt.textContent=(i.species||'')+(i.specH?' H'+i.specH:'')+(i.specC?' C'+i.specC:'')+(i.specW?' W'+i.specW:'')+' — 在庫:'+i.qty+'本';
    sel.appendChild(opt);
  });
}

function updateOutInfo(){
  var id=v('out-item'),q=Number(v('out-qty'))||0,wrap=document.getElementById('out-info-wrap'),info=document.getElementById('out-info');
  if(!id){wrap.style.display='none';return;}
  var item=inventory.find(function(i){return i.id===id;});
  if(!item){wrap.style.display='none';return;}
  wrap.style.display='block';
  var after=Number(item.qty)-q;
  info.innerHTML='現在在庫：<strong>'+item.qty+'本</strong>'+(q?'　出庫後：<strong style="color:'+(after<0?'#c62828':'#1a1a1a')+'">'+after+'本</strong>':'');
}

async function submitOut(){
  var id=v('out-item'),qty=Number(v('out-qty'));
  if(!id||!qty){alert('品目と数量は必須です');return;}
  var item=inventory.find(function(i){return i.id===id;});
  if(!item){alert('品目が見つかりません');return;}
  if(qty>Number(item.qty)){alert('在庫数を超えています');return;}
  var newQty=Number(item.qty)-qty;
  await db.collection('inventory').doc(id).update({qty:newQty});
  await db.collection('history').add({type:v('out-reason'),date:v('out-date'),species:item.species,specH:item.specH,specC:item.specC,specW:item.specW,qty,memo:v('out-memo'),createdAt:firebase.firestore.FieldValue.serverTimestamp()});
  await loadAll(); renderList(); buildOutSelect();
  alert('✅ 出庫登録しました');
  ['out-qty','out-memo'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('out-item').value='';
  document.getElementById('out-info-wrap').style.display='none';
}

// ======== 仕入先 ========
function buildSupSelects(){
  ['in-supplier','m-supplier'].forEach(function(id){
    var sel=document.getElementById(id);
    if(!sel)return;
    var cur=sel.value;
    sel.innerHTML='<option value="">選択してください...</option>';
    suppliers.forEach(function(s){var opt=document.createElement('option');opt.value=s.id;opt.textContent=s.name;sel.appendChild(opt);});
    var other=document.createElement('option');other.value='__other__';other.textContent='その他（直接入力）';sel.appendChild(other);
    if(cur)sel.value=cur;
  });
}

function toggleFree(p){document.getElementById(p+'-free-wrap').style.display=v(p+'-supplier')==='__other__'?'block':'none';}

function renderSup(){
  if(!suppliers.length){document.getElementById('sup-body').innerHTML='<div class="empty">仕入先が未登録です</div>';return;}
  document.getElementById('sup-body').innerHTML='<table class="tbl"><thead><tr><th>仕入先名</th><th>電話番号</th><th>備考</th><th></th></tr></thead><tbody>'+
    suppliers.map(function(s){return '<tr><td style="font-weight:600">'+esc(s.name)+'</td><td style="color:#666">'+esc(s.tel||'未登録')+'</td><td style="color:#888">'+esc(s.memo||'')+'</td>'
      +'<td style="white-space:nowrap"><button class="btn btn-sm" onclick="editSup(\''+s.id+'\')">編集</button> <button class="btn btn-sm btn-danger" onclick="delSup(\''+s.id+'\')">削除</button></td></tr>';}).join('')
    +'</tbody></table>';
}

function openSupModal(){editSupId=null;document.getElementById('sup-modal-title').textContent='仕入先追加';['sm-name','sm-tel','sm-memo'].forEach(function(id){document.getElementById(id).value='';});openModal('sup-modal');}
function editSup(id){var s=suppliers.find(function(x){return x.id===id;});if(!s)return;editSupId=id;document.getElementById('sup-modal-title').textContent='仕入先編集';document.getElementById('sm-name').value=s.name||'';document.getElementById('sm-tel').value=s.tel||'';document.getElementById('sm-memo').value=s.memo||'';openModal('sup-modal');}

async function saveSup(){
  var name=v('sm-name').trim();if(!name){alert('仕入先名は必須です');return;}
  var data={name,tel:v('sm-tel'),memo:v('sm-memo')};
  if(editSupId) await db.collection('suppliers').doc(editSupId).update(data);
  else await db.collection('suppliers').add(data);
  await loadAll();closeModal('sup-modal');renderSup();
}

async function delSup(id){if(!confirm('削除しますか？'))return;await db.collection('suppliers').doc(id).delete();await loadAll();renderSup();}

// ======== 品目モーダル ========
function openAddModal(){editItemId=null;document.getElementById('modal-title').textContent='品目追加';['m-species','m-h','m-c','m-w','m-price','m-free','m-memo'].forEach(function(id){document.getElementById(id).value='';});document.getElementById('m-supplier').value='';document.getElementById('m-free-wrap').style.display='none';openModal('item-modal');}
function editItem(id){var item=inventory.find(function(i){return i.id===id;});if(!item)return;editItemId=id;document.getElementById('modal-title').textContent='品目編集';document.getElementById('m-species').value=item.species||'';document.getElementById('m-h').value=item.specH||'';document.getElementById('m-c').value=item.specC||'';document.getElementById('m-w').value=item.specW||'';document.getElementById('m-price').value=item.buyPrice||'';document.getElementById('m-supplier').value=item.supplierId||'';document.getElementById('m-free').value=item.supplierFree||'';document.getElementById('m-free-wrap').style.display=item.supplierId==='__other__'?'block':'none';document.getElementById('m-memo').value=item.memo||'';openModal('item-modal');}

async function saveItem(){
  var species=v('m-species').trim();if(!species){alert('樹種名は必須です');return;}
  var data={species,specH:v('m-h'),specC:v('m-c'),specW:v('m-w'),buyPrice:v('m-price'),supplierId:v('m-supplier'),supplierFree:v('m-free'),memo:v('m-memo')};
  if(editItemId) await db.collection('inventory').doc(editItemId).update(data);
  else await db.collection('inventory').add({...data,qty:0});
  await loadAll();closeModal('item-modal');renderList();buildOutSelect();
}

async function delItem(id){if(!confirm('この品目を削除しますか？'))return;await db.collection('inventory').doc(id).delete();await loadAll();renderList();buildOutSelect();}

// ======== 履歴 ========
function renderHistory(){
  var f=v('hist-filter'),sm=supMap();
  var rows=history.filter(function(h){return !f||h.type===f;});
  if(!rows.length){document.getElementById('hist-body').innerHTML='<div class="empty">履歴がありません</div>';return;}
  var badgeClass=function(t){return t==='入庫'?'badge-in':t==='移植'?'badge-move':'badge-out';};
  document.getElementById('hist-body').innerHTML='<table class="tbl"><thead><tr><th>日付</th><th>区分</th><th>樹種</th><th>規格</th><th>数量</th><th>仕入値</th><th>仕入先</th><th>備考</th></tr></thead><tbody>'+
    rows.map(function(h){
      return '<tr>'
        +'<td style="white-space:nowrap">'+esc((h.date||'').replace(/-/g,'/'))+'</td>'
        +'<td><span class="badge '+badgeClass(h.type)+'">'+esc(h.type||'-')+'</span></td>'
        +'<td style="font-weight:600">'+esc(h.species||'-')+'</td>'
        +'<td style="color:#666">'+esc(mkSpec(h))+'</td>'
        +'<td>'+fmt(h.qty)+'本</td>'
        +'<td>'+(h.buyPrice?'¥'+fmt(h.buyPrice):'-')+'</td>'
        +'<td style="color:#666">'+esc(sm[h.supplierId]||h.supplierFree||'-')+'</td>'
        +'<td style="color:#888">'+esc(h.memo||'')+'</td></tr>';
    }).join('')+'</tbody></table>';
}

// ======== ユーティリティ ========
function v(id){return (document.getElementById(id)||{value:''}).value||'';}
function str(x){return String(x||'');}
function fmt(n){return (n==null||n==='')?'-':Number(n).toLocaleString('ja-JP');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function supMap(){var m={};suppliers.forEach(function(s){m[s.id]=s.name;});return m;}
function mkSpec(item){return [item.specH&&('H'+item.specH),item.specC&&('C'+item.specC),item.specW&&('W'+item.specW)].filter(Boolean).join(' / ')||'-';}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.overlay').forEach(function(el){el.addEventListener('click',function(e){if(e.target===el)el.classList.remove('open');});});

init();
</script>
</body>
</html>
